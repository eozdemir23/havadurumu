<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Vision Pro - 2026</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="clear-day">

<div class="video-container">
    <video autoplay muted loop id="bgVideo" poster="https://images.unsplash.com/photo-1504608524841-42fe6f032b4b?q=80&w=2000&auto=format&fit=crop">
        <source src="" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
</div>

<div class="nevruz-header">
    <div class="nevruz-content">
        <span class="nevruz-icon">🌸</span>
        <p>21 Mart Nevruz Bayramı Kutlu Olsun! 🔥 🌱</p>
    </div>
</div>

<div class="glass-card main-container">
    <div class="top-bar">
        <div class="search-box">
            <input type="text" id="sehirInput" placeholder="Şehir keşfet..." oninput="sehirOnerileriGetir()">
            <button onclick="verileriGetir()"><i class="fas fa-search"></i></button>
            <div id="suggestions" class="suggestions-list"></div>
        </div>
        <button id="favBtn" onclick="favoriEkle()" class="action-btn"><i class="far fa-star"></i></button>
        <button onclick="paylas()" class="action-btn"><i class="fas fa-share-alt"></i></button>
    </div>

    <div id="favBar" class="favorites-bar"></div>

    <div id="weatherDisplay">
        <div class="main-info">
            <p id="liveTime" class="time-stamp"></p>
            <h1 id="sehirAd" class="city-name">YÜKLENİYOR...</h1>
            <div class="temp-container">
                <p id="derece" class="temp">0°</p>
                <div id="weatherIcon" class="weather-icon-main"></div>
            </div>
            <p id="durum" class="desc">---</p>
        </div>

        <div class="health-panel">
            <div class="aqi-section">
                <span id="aqiBadge" class="aqi-tag">AQI: --</span>
                <p id="healthAdvice" class="health-note">Veri alınıyor...</p>
            </div>
        </div>

        <div class="section-title">📊 24 Saatlik Sıcaklık Değişimi</div>
        <div class="chart-wrapper">
            <canvas id="weatherChart"></canvas>
        </div>

        <div class="section-title">📅 5 Günlük Tahmin</div>
        <div id="forecastContainer" class="forecast-row"></div>

        <div class="radar-container" id="radarParent">
            <div class="radar-header">
                <span>🛰️ Canlı Yağış Radarı</span>
                <button onclick="toggleRadarFullscreen()" id="fsBtn"><i class="fas fa-expand"></i></button>
            </div>
            <div id="map"></div>
        </div>

        <div class="details-grid">
            <div class="detail-item"><i class="fas fa-tint"></i><p>Yağış</p><p id="rainChance">0%</p></div>
            <div class="detail-item"><i class="fas fa-wind"></i><p>Rüzgar</p><p id="ruzgar">0 m/s</p></div>
            <div class="detail-item"><i class="fas fa-sun"></i><p>Doğuş</p><p id="sunrise">--:--</p></div>
            <div class="detail-item"><i class="fas fa-moon"></i><p>Batış</p><p id="sunset">--:--</p></div>
            <div class="detail-item"><i class="fas fa-water"></i><p>Nem</p><p id="humidity">0%</p></div>
            <div class="detail-item"><i class="fas fa-thermometer-half"></i><p>Hissedilen</p><p id="hissedilen">--°</p></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
