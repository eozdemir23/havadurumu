<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeatherOS | Cloud Secure v2.3</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>

    <main class="bento-container">
        <section class="glass-tile hero-section">
            <div id="liveTime" class="live-clock">00:00</div>
            <h1 id="sehirAd" class="os-city">YÜKLENİYOR...</h1>
            <div id="derece" class="os-temp">0°</div>
            <p id="durum" class="os-condition">---</p>
            
            <div class="aqi-container">
                <div id="aqiBadge" class="aqi-pill">HAVA KALİTESİ: --</div>
                <div class="aqi-bar-bg">
                    <div id="aqi-progress"></div>
                </div>
            </div>
        </section>

        <section class="glass-tile radar-section">
            <p class="tile-label">🛰️ CANLI RADAR</p>
            <div id="map"></div>
            <button id="playBtn" onclick="radarOynat()" class="radar-action-btn">▶ Oynat</button>
        </section>

        <section class="glass-tile chart-section">
            <p class="tile-label">📈 24 SAATLİK SEYİR</p>
            <div class="chart-wrapper">
                <canvas id="weatherChart"></canvas>
            </div>
        </section>

        <section class="glass-tile wellness-section">
            <p class="tile-label">👕 ANALİZ</p>
            <div id="suggestionBox">
                <p id="suggestionText">Veriler işleniyor...</p>
            </div>
        </section>

        <section class="stats-grid-container">
            <div class="stat-item"><span>Yağış</span><p id="rainChance">0%</p></div>
            <div class="stat-item"><span>Rüzgar</span><p id="ruzgar">0 m/s</p></div>
            <div class="stat-item"><span>Nem</span><p id="humidity">0%</p></div>
            <div class="stat-item"><span>Hissedilen</span><p id="hissedilen">--°</p></div>
        </section>

        <section class="glass-tile forecast-section">
            <p class="tile-label">📅 HAFTALIK ÖZET</p>
            <div id="weeklyForecast" class="forecast-row"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="location.reload()">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">EV</span>
        </div>

        <div class="nav-item search-wrapper" onclick="toggleSearchModal()">
            <div class="search-circle">🔍</div>
            <span class="search-label">ARA</span>
        </div>

        <div class="nav-item" onclick="toggleAdminModal()">
            <span class="nav-icon">🛡️</span>
            <span class="nav-text">YÖNETİM</span>
        </div>
    </nav>

    <div id="searchModal" class="search-modal">
        <div class="modal-content">
            <input type="text" id="sehirInput" placeholder="Şehir arayın..." oninput="sehirOnerileriGetir()">
            <div id="suggestions" class="suggestions-list"></div>
            <button class="close-btn" onclick="toggleSearchModal()">Kapat</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
